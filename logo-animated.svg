<svg viewBox="0 0 208 208" xmlns="http://www.w3.org/2000/svg" width="208" height="208">
<style>
/* Total cycle = 6s (4.5s animation + 1.5s pause at end) */
.cc{opacity:0;animation:popIn .3s ease-out infinite;animation-duration:.3s;animation-fill-mode:both}
.cc1{animation-delay:.2s;animation-duration:.3s;animation-iteration-count:infinite;animation-direction:normal;animation:ccLoop 6s ease-out .2s infinite}
.cc2{animation:ccLoop 6s ease-out .55s infinite}
.cc3{animation:ccLoop 6s ease-out .9s infinite}
.cc4{animation:ccLoop 6s ease-out 1.25s infinite}
.cline{stroke-dasharray:100;stroke-dashoffset:100;animation:lineLoop 6s ease-out infinite}
.cl1{animation-delay:.5s;animation:lineLoop 6s ease-out .5s infinite}
.cl2{animation:lineLoop 6s ease-out .85s infinite}
.cl3{animation:lineLoop 6s ease-out 1.2s infinite}
.cl4{animation:lineLoop 6s ease-out 1.55s infinite}
.chart-red{stroke:#27ae60;stroke-dasharray:400;stroke-dashoffset:400;animation:chartLoop 6s ease-in-out 1.9s infinite}
.chart-gold{stroke:url(#gl);stroke-dasharray:400;stroke-dashoffset:400;opacity:0;animation:chartGoldLoop 6s ease-in-out 1.9s infinite}
.cfill{opacity:0;animation:fillLoop 6s ease-out 3.1s infinite}
.cn{opacity:0;animation:nodeLoop 6s cubic-bezier(.17,.67,.3,1.5) 3.4s infinite;transform-origin:104px 104px}
.cd{opacity:0;animation:nodeLoop 6s cubic-bezier(.17,.67,.3,1.5) 3.6s infinite;transform-origin:104px 104px}

@keyframes ccLoop{
  0%{opacity:0;transform:scale(.3)}
  3.5%{transform:scale(1.2);opacity:1}
  7%,75%{transform:scale(1);opacity:1}
  80%,100%{opacity:0;transform:scale(.3)}
}
@keyframes lineLoop{
  0%{stroke-dashoffset:100}
  7%,75%{stroke-dashoffset:0}
  80%,100%{stroke-dashoffset:100}
}
@keyframes chartLoop{
  0%{stroke-dashoffset:400}
  20%,75%{stroke-dashoffset:0}
  80%,100%{stroke-dashoffset:400}
}
@keyframes chartGoldLoop{
  0%,27%{stroke-dashoffset:400;opacity:0}
  37%,75%{stroke-dashoffset:0;opacity:1}
  80%,100%{stroke-dashoffset:400;opacity:0}
}
@keyframes fillLoop{
  0%,27%{opacity:0}
  37%,75%{opacity:1}
  80%,100%{opacity:0}
}
@keyframes nodeLoop{
  0%,55%{opacity:0;transform:scale(.3)}
  63%{transform:scale(1.2);opacity:1}
  70%,75%{transform:scale(1);opacity:1}
  80%,100%{opacity:0;transform:scale(.3)}
}
</style>
<defs>
  <linearGradient id="cf" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#c9a84c" stop-opacity=".22"/>
    <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="gl" x1="0%" y1="100%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#9a7a2e"/>
    <stop offset="50%" stop-color="#c9a84c"/>
    <stop offset="100%" stop-color="#f0d878"/>
  </linearGradient>
</defs>

<rect width="208" height="208" rx="32" fill="#0d1018"/>
<rect x="38" y="38" width="132" height="132" rx="6" fill="rgba(201,168,76,.04)" stroke="rgba(201,168,76,.2)" stroke-width="2.5"/>

<line class="cline cl1" x1="38"  y1="38"  x2="104" y2="104" stroke="rgba(201,168,76,.4)" stroke-width="4.5" stroke-linecap="round"/>
<line class="cline cl2" x1="170" y1="38"  x2="104" y2="104" stroke="rgba(201,168,76,.4)" stroke-width="4.5" stroke-linecap="round"/>
<line class="cline cl3" x1="38"  y1="170" x2="104" y2="104" stroke="rgba(201,168,76,.4)" stroke-width="4.5" stroke-linecap="round"/>
<line class="cline cl4" x1="170" y1="170" x2="104" y2="104" stroke="rgba(201,168,76,.4)" stroke-width="4.5" stroke-linecap="round"/>

<polygon class="cfill" points="44,158 58,144 70,150 82,134 96,138 104,104 116,118 128,112 142,96 158,82 166,86 166,166 44,166" fill="url(#cf)"/>
<polyline class="chart-red"  points="44,158 58,144 70,150 82,134 96,138 104,104 116,118 128,112 142,96 158,82 166,86" fill="none" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
<polyline class="chart-gold" points="44,158 58,144 70,150 82,134 96,138 104,104 116,118 128,112 142,96 158,82 166,86" fill="none" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>

<g class="cc cc1" style="transform-origin:38px 38px">
  <circle cx="38"  cy="38"  r="17" fill="#0d1018" stroke="#c9a84c" stroke-width="4"/>
  <circle cx="38"  cy="38"  r="6"  fill="#c9a84c"/>
</g>
<g class="cc cc2" style="transform-origin:170px 38px">
  <circle cx="170" cy="38"  r="17" fill="#0d1018" stroke="#c9a84c" stroke-width="4"/>
  <circle cx="170" cy="38"  r="6"  fill="#c9a84c"/>
</g>
<g class="cc cc3" style="transform-origin:38px 170px">
  <circle cx="38"  cy="170" r="17" fill="#0d1018" stroke="#c9a84c" stroke-width="4"/>
  <circle cx="38"  cy="170" r="6"  fill="#c9a84c"/>
</g>
<g class="cc cc4" style="transform-origin:170px 170px">
  <circle cx="170" cy="170" r="17" fill="#0d1018" stroke="#c9a84c" stroke-width="4"/>
  <circle cx="170" cy="170" r="6"  fill="#c9a84c"/>
</g>

<g class="cn">
  <circle cx="104" cy="104" r="13" fill="#0d1018" stroke="#c9a84c" stroke-width="3.5"/>
  <g class="cd">
    <circle cx="104" cy="104" r="5" fill="#e8c97a"/>
    <line x1="94" y1="104" x2="114" y2="104" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="104" y1="94"  x2="104" y2="114" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round"/>
  </g>
</g>
</svg>
