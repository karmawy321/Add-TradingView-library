<svg viewBox="0 0 208 208" xmlns="http://www.w3.org/2000/svg" width="208" height="208">
<style>
.cc1{opacity:0;transform-origin:38px 38px;  animation:cc1L 7s ease-out infinite}
.cc2{opacity:0;transform-origin:170px 38px; animation:cc2L 7s ease-out infinite}
.cc3{opacity:0;transform-origin:38px 170px; animation:cc3L 7s ease-out infinite}
.cc4{opacity:0;transform-origin:170px 170px;animation:cc4L 7s ease-out infinite}
.cl1{stroke-dasharray:100;stroke-dashoffset:100;animation:cl1L 7s ease-out infinite}
.cl2{stroke-dasharray:100;stroke-dashoffset:100;animation:cl2L 7s ease-out infinite}
.cl3{stroke-dasharray:100;stroke-dashoffset:100;animation:cl3L 7s ease-out infinite}
.cl4{stroke-dasharray:100;stroke-dashoffset:100;animation:cl4L 7s ease-out infinite}
.cg  {stroke:#27ae60;stroke-dasharray:400;stroke-dashoffset:400;animation:cgL   7s ease-in-out infinite}
.cgold{stroke:url(#gl);stroke-dasharray:400;stroke-dashoffset:400;opacity:0;animation:cgoldL 7s ease-in-out infinite}
.cfill{opacity:0;animation:fillL 7s ease-out infinite}
.cn{opacity:0;transform-origin:104px 104px;animation:cnL 7s cubic-bezier(.17,.67,.3,1.5) infinite}
.cd{opacity:0;transform-origin:104px 104px;animation:cdL 7s cubic-bezier(.17,.67,.3,1.5) infinite}
@keyframes cc1L{0%{opacity:0;transform:scale(.3)}3%{transform:scale(1.25);opacity:1}6%,71%{transform:scale(1);opacity:1}79%,100%{opacity:0;transform:scale(.3)}}
@keyframes cc2L{0%,5%{opacity:0;transform:scale(.3)}8%{transform:scale(1.25);opacity:1}11%,71%{transform:scale(1);opacity:1}79%,100%{opacity:0;transform:scale(.3)}}
@keyframes cc3L{0%,10%{opacity:0;transform:scale(.3)}13%{transform:scale(1.25);opacity:1}16%,71%{transform:scale(1);opacity:1}79%,100%{opacity:0;transform:scale(.3)}}
@keyframes cc4L{0%,15%{opacity:0;transform:scale(.3)}18%{transform:scale(1.25);opacity:1}21%,71%{transform:scale(1);opacity:1}79%,100%{opacity:0;transform:scale(.3)}}
@keyframes cl1L{0%,4%{stroke-dashoffset:100}12%,71%{stroke-dashoffset:0}79%,100%{stroke-dashoffset:100}}
@keyframes cl2L{0%,9%{stroke-dashoffset:100}17%,71%{stroke-dashoffset:0}79%,100%{stroke-dashoffset:100}}
@keyframes cl3L{0%,14%{stroke-dashoffset:100}22%,71%{stroke-dashoffset:0}79%,100%{stroke-dashoffset:100}}
@keyframes cl4L{0%,19%{stroke-dashoffset:100}27%,71%{stroke-dashoffset:0}79%,100%{stroke-dashoffset:100}}
@keyframes cgL{0%,24%{stroke-dashoffset:400}41%,71%{stroke-dashoffset:0}79%,100%{stroke-dashoffset:400}}
@keyframes cgoldL{0%,41%{stroke-dashoffset:400;opacity:0}49%,71%{stroke-dashoffset:0;opacity:1}79%,100%{stroke-dashoffset:400;opacity:0}}
@keyframes fillL{0%,41%{opacity:0}49%,71%{opacity:1}79%,100%{opacity:0}}
@keyframes cnL{0%,49%{opacity:0;transform:scale(.3)}54%{transform:scale(1.25);opacity:1}58%,71%{transform:scale(1);opacity:1}79%,100%{opacity:0;transform:scale(.3)}}
@keyframes cdL{0%,53%{opacity:0;transform:scale(.3)}58%{transform:scale(1.3);opacity:1}62%,71%{transform:scale(1);opacity:1}79%,100%{opacity:0;transform:scale(.3)}}
</style>
<defs>
  <linearGradient id="cf" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#c9a84c" stop-opacity=".22"/><stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/></linearGradient>
  <linearGradient id="gl" x1="0%" y1="100%" x2="100%" y2="0%"><stop offset="0%" stop-color="#9a7a2e"/><stop offset="50%" stop-color="#c9a84c"/><stop offset="100%" stop-color="#f0d878"/></linearGradient>
</defs>
<rect width="208" height="208" rx="32" fill="#0d1018"/>
<rect x="38" y="38" width="132" height="132" rx="6" fill="rgba(201,168,76,.04)" stroke="rgba(201,168,76,.2)" stroke-width="2.5"/>
<line class="cl1" x1="38"  y1="38"  x2="104" y2="104" stroke="rgba(201,168,76,.4)" stroke-width="4.5" stroke-linecap="round"/>
<line class="cl2" x1="170" y1="38"  x2="104" y2="104" stroke="rgba(201,168,76,.4)" stroke-width="4.5" stroke-linecap="round"/>
<line class="cl3" x1="38"  y1="170" x2="104" y2="104" stroke="rgba(201,168,76,.4)" stroke-width="4.5" stroke-linecap="round"/>
<line class="cl4" x1="170" y1="170" x2="104" y2="104" stroke="rgba(201,168,76,.4)" stroke-width="4.5" stroke-linecap="round"/>
<polygon class="cfill" points="44,158 58,144 70,150 82,134 96,138 104,104 116,118 128,112 142,96 158,82 166,86 166,166 44,166" fill="url(#cf)"/>
<polyline class="cg"    points="44,158 58,144 70,150 82,134 96,138 104,104 116,118 128,112 142,96 158,82 166,86" fill="none" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
<polyline class="cgold" points="44,158 58,144 70,150 82,134 96,138 104,104 116,118 128,112 142,96 158,82 166,86" fill="none" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
<g class="cc1"><circle cx="38"  cy="38"  r="17" fill="#0d1018" stroke="#c9a84c" stroke-width="4"/><circle cx="38"  cy="38"  r="6" fill="#c9a84c"/></g>
<g class="cc2"><circle cx="170" cy="38"  r="17" fill="#0d1018" stroke="#c9a84c" stroke-width="4"/><circle cx="170" cy="38"  r="6" fill="#c9a84c"/></g>
<g class="cc3"><circle cx="38"  cy="170" r="17" fill="#0d1018" stroke="#c9a84c" stroke-width="4"/><circle cx="38"  cy="170" r="6" fill="#c9a84c"/></g>
<g class="cc4"><circle cx="170" cy="170" r="17" fill="#0d1018" stroke="#c9a84c" stroke-width="4"/><circle cx="170" cy="170" r="6" fill="#c9a84c"/></g>
<g class="cn">
  <circle cx="104" cy="104" r="13" fill="#0d1018" stroke="#c9a84c" stroke-width="3.5"/>
  <g class="cd">
    <circle cx="104" cy="104" r="5" fill="#e8c97a"/>
    <line x1="94" y1="104" x2="114" y2="104" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="104" y1="94"  x2="104" y2="114" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round"/>
  </g>
</g>
</svg>
