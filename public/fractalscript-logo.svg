<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5D76E"/>
      <stop offset="100%" stop-color="#C9A227"/>
    </linearGradient>
  </defs>

  <!-- ─── Deep matte black canvas ─── -->
  <rect x="0" y="0" width="512" height="512" rx="110" ry="110" fill="#0A0A0A"/>

  <!-- ─── Thin gold frame ─── -->
  <rect x="24" y="24" width="464" height="464" rx="92" ry="92"
        fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.9"/>

  <!-- ═══════════════════════════════════════════════════════
       FRACTAL CHART (BACKGROUND LAYER)
       Placed FIRST so it renders BEHIND the integral text
       ═══════════════════════════════════════════════════════ -->

  <!-- Area under the curve (the integral itself) -->
  <path d="M 90 330
           L 130 295
           L 160 325
           L 200 240
           L 240 275
           L 285 195
           L 325 225
           L 370 155
           L 420 185
           L 420 400
           L 90 400 Z"
        fill="url(#gold)" opacity="0.10"/>

  <!-- The fractal/price curve line itself -->
  <path d="M 90 330
           L 130 295
           L 160 325
           L 200 240
           L 240 275
           L 285 195
           L 325 225
           L 370 155
           L 420 185"
        fill="none" stroke="url(#gold)" stroke-width="3"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.35"/>

  <!-- Subtle peak markers (data points) -->
  <g fill="url(#gold)" opacity="0.6">
    <circle cx="200" cy="240" r="2.5"/>
    <circle cx="285" cy="195" r="2.5"/>
    <circle cx="370" cy="155" r="3"/>
  </g>

  <!-- ═══════════════════════════════════════════════════════
       ∫ f(x) — AUTHENTIC integral (FOREGROUND LAYER)
       Font: Georgia (classical math-style serif)
       ═══════════════════════════════════════════════════════ -->
  <text x="256" y="325"
        font-family="'Cambria Math', 'Latin Modern Math', Cambria, Georgia, 'Times New Roman', serif"
        font-size="220" font-style="italic" font-weight="400"
        fill="url(#gold)" text-anchor="middle" letter-spacing="-4">
    ∫<tspan font-size="160" dx="-8" dy="0">f(x)</tspan>
  </text>

  <!-- ─── Minimal horizon baseline ─── -->
  <line x1="110" y1="370" x2="402" y2="370"
        stroke="url(#gold)" stroke-width="2" stroke-linecap="round" opacity="0.75"/>
</svg>