<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#06080d; overflow:hidden; }
#tv_chart_container { width:100%; height:100%; }
</style>
</head>
<body>
<div id="tv_chart_container"></div>
<script src="https://add-tradingview-library-production.up.railway.app/datafeed.js"></script>
<script src="https://add-tradingview-library-production.up.railway.app/charting_library/charting_library.standalone.js"></script>
<script>
var RAILWAY = 'https://add-tradingview-library-production.up.railway.app';

var params = {};
try {
  window.location.hash.replace('#','').split('&').forEach(function(p){
    var kv = p.split('=');
    if (kv[0]) params[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1]||'');
  });
} catch(e){}

var symbol   = params.symbol   || null;
var interval = params.interval || '240';
var locale   = params.locale   || 'en';
var tvWidget = null;
var sma200Id = null;
var sma400Id = null;

function initTV() {
  if (typeof TradingView === 'undefined' || !TradingView.widget) {
    setTimeout(initTV, 200);
    return;
  }
  /* Don't init until a symbol is provided */
  if (!symbol) {
    /* Wait for set_symbol message from parent */
    return;
  }

  tvWidget = new TradingView.widget({
    container:      'tv_chart_container',
    library_path:   RAILWAY + '/charting_library/',
    datafeed:       FractalDatafeed,
    symbol:         symbol || 'BTCUSDT', /* default only if parent sends one */
    interval:       interval,
    locale:         locale,
    theme:          'Dark',
    autosize:       true,
    toolbar_bg:     '#06080d',
    loading_screen: { backgroundColor: '#06080d', foregroundColor: '#c9a84c' },
    overrides: {
      'paneProperties.background':               '#06080d',
      'paneProperties.backgroundType':           'solid',
      'paneProperties.vertGridProperties.color': 'rgba(201,168,76,0.05)',
      'paneProperties.horzGridProperties.color': 'rgba(201,168,76,0.05)',
      'scalesProperties.textColor':              'rgba(201,168,76,0.7)',
      'scalesProperties.lineColor':              'rgba(201,168,76,0.15)',
      'mainSeriesProperties.candleStyle.upColor':         '#26a69a',
      'mainSeriesProperties.candleStyle.downColor':       '#ef5350',
      'mainSeriesProperties.candleStyle.borderUpColor':   '#26a69a',
      'mainSeriesProperties.candleStyle.borderDownColor': '#ef5350',
      'mainSeriesProperties.candleStyle.wickUpColor':     '#26a69a',
      'mainSeriesProperties.candleStyle.wickDownColor':   '#ef5350'
    },
    studies_overrides: {},
    disabled_features: ['use_localstorage_for_settings'],
    enabled_features:  ['study_templates'],
    client_id: 'fractal_ai_agent',
    user_id:   'public_user'
  });

  tvWidget.onChartReady(function() {
    addSMAs();
    try { window.parent.postMessage({ type: 'tv_ready', symbol: symbol }, '*'); } catch(e){}
  });
}

function addSMAs() {
  if (!tvWidget) return;
  try {
    var chart = tvWidget.activeChart();
    /* Remove old SMAs if exist */
    if (sma200Id) { try { chart.removeEntity(sma200Id); } catch(e){} }
    if (sma400Id) { try { chart.removeEntity(sma400Id); } catch(e){} }
    /* Add fresh SMA 200 and SMA 400 */
    /* Use exact study name as registered in TV library */
    chart.createStudy('Moving Average', false, false, { length: 200 })
      .then(function(id){ sma200Id = id; return chart.getStudyById(id); })
      .then(function(study){ study.applyOverrides({ 'Plot.color':'#3498db', 'Plot.linewidth':2 }); })
      .catch(function(){
        /* Fallback: try legacy API format */
        try {
          sma200Id = chart.createStudy('Moving Average', false, false, [200], {'Plot.color':'#3498db','Plot.linewidth':2});
        } catch(e2){ console.warn('SMA 200 failed:', e2); }
      });
    chart.createStudy('Moving Average', false, false, { length: 400 })
      .then(function(id){ sma400Id = id; return chart.getStudyById(id); })
      .then(function(study){ study.applyOverrides({ 'Plot.color':'#c9a84c', 'Plot.linewidth':2 }); })
      .catch(function(){
        try {
          sma400Id = chart.createStudy('Moving Average', false, false, [400], {'Plot.color':'#c9a84c','Plot.linewidth':2});
        } catch(e2){ console.warn('SMA 400 failed:', e2); }
      });
  } catch(e) { console.warn('addSMAs error:', e); }
}

window.addEventListener('message', function(e) {
  if (!e.data || !e.data.type) return;

  if (e.data.type === 'set_symbol') {
    symbol   = e.data.symbol;
    interval = e.data.interval || interval;
    if (!tvWidget) {
      /* First symbol — init the chart */
      initTV();
    } else {
      /* Chart exists — just switch symbol */
      tvWidget.onChartReady(function() {
        tvWidget.setSymbol(e.data.symbol, e.data.interval || interval, function(){
          setTimeout(addSMAs, 500);
          try { window.parent.postMessage({ type:'symbol_changed', symbol:e.data.symbol }, '*'); } catch(e){}
        });
      });
    }
  }

  if (e.data.type === 'toggle_sma' && tvWidget) {
    tvWidget.onChartReady(function() {
      var chart = tvWidget.activeChart();
      var id = e.data.period === 200 ? sma200Id : sma400Id;
      if (id) {
        try { chart.removeEntity(id); if(e.data.period===200) sma200Id=null; else sma400Id=null; }
        catch(err) {}
      } else {
        /* Re-add */
        var color = e.data.period === 200 ? '#3498db' : '#c9a84c';
        try {
          chart.createStudy('Moving Average', false, false, { length: e.data.period })
            .then(function(id2){
              if(e.data.period===200) sma200Id=id2; else sma400Id=id2;
              chart.getStudyById(id2).then(function(s){ s.applyOverrides({'Plot.color':color,'Plot.linewidth':2}); }).catch(function(){});
            }).catch(function(){
              var id3 = chart.createStudy('Moving Average', false, false, [e.data.period], {'Plot.color':color,'Plot.linewidth':2});
              if(e.data.period===200) sma200Id=id3; else sma400Id=id3;
            });
        } catch(err){}
      }
    });
  }

  if (e.data.type === 'screenshot' && tvWidget) {
    tvWidget.onChartReady(function() {
      tvWidget.takeClientScreenshot()
        .then(function(canvas){
          try { window.parent.postMessage({ type:'screenshot_ready', dataUrl:canvas.toDataURL('image/png') }, '*'); } catch(e){}
        })
        .catch(function(){
          try { window.parent.postMessage({ type:'screenshot_error' }, '*'); } catch(e){}
        });
    });
  }
});

initTV();
</script>
</body>
</html>
